// ===================== QUIZ ENGINE =====================
let currentExam = -1;
let currentQ = 0;
let examQuestions = [];

function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startExam(idx) {
    currentExam = idx;
    currentQ = 0;
    // Shuffle options for each question (keeping track of correct answer)
    examQuestions = allExams[idx].map(q => {
        const options = q.o.map((text, i) => ({ text, isCorrect: i === q.a }));
        const shuffled = shuffleArray(options);
        return { ...q, shuffledOptions: shuffled };
    });
    document.getElementById('examSelector').style.display = 'none';
    document.getElementById('quizArea').classList.add('visible');
    buildStreakDots();
    showQuestion();
}

function buildStreakDots() {
    const container = document.getElementById('streakDots');
    container.innerHTML = '';
    for (let i = 0; i < 40; i++) {
        const dot = document.createElement('div');
        dot.className = 'streak-dot';
        dot.id = 'dot-' + i;
        container.appendChild(dot);
    }
}

function showQuestion() {
    const q = examQuestions[currentQ];
    document.getElementById('qNum').textContent = currentQ + 1;
    document.getElementById('progressBar').style.width = ((currentQ / 40) * 100) + '%';
    
    const badge = document.getElementById('diffBadge');
    badge.textContent = q.d === 'facil' ? 'Fácil' : q.d === 'media' ? 'Media' : 'Difícil';
    badge.className = 'difficulty-badge difficulty-' + q.d;

    document.getElementById('qText').textContent = q.q;

    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.shuffledOptions.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.onclick = () => selectAnswer(btn, opt.isCorrect, i);
        grid.appendChild(btn);
    });

    // Update current dot
    for (let i = 0; i < 40; i++) {
        const dot = document.getElementById('dot-' + i);
        if (dot) dot.classList.remove('current');
    }
    const currentDot = document.getElementById('dot-' + currentQ);
    if (currentDot) currentDot.classList.add('current');

    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(btn, isCorrect, idx) {
    // Disable all buttons
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.classList.add('disabled'));

    if (isCorrect) {
        btn.classList.add('correct');
        const dot = document.getElementById('dot-' + currentQ);
        if (dot) { dot.classList.add('filled'); dot.classList.remove('current'); }

        setTimeout(() => {
            currentQ++;
            if (currentQ >= 40) {
                showSuccess();
            } else {
                showQuestion();
            }
        }, 600);
    } else {
        btn.classList.add('wrong');
        // Show correct answer
        allBtns.forEach(b => {
            const q = examQuestions[currentQ];
            const optText = b.textContent;
            const correctOpt = q.shuffledOptions.find(o => o.isCorrect);
            if (optText === correctOpt.text) {
                b.classList.add('correct');
            }
        });
        setTimeout(() => {
            showFail();
        }, 1200);
    }
}

function showFail() {
    const q = examQuestions[currentQ];
    document.getElementById('failMsg').textContent = 
        'Fallaste en la pregunta ' + (currentQ + 1) + '. Vuelves a empezar desde la pregunta 1.';
    document.getElementById('failOverlay').classList.add('visible');
}

function showSuccess() {
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('successOverlay').classList.add('visible');
}

function restartExam() {
    document.getElementById('failOverlay').classList.remove('visible');
    currentQ = 0;
    // Re-shuffle options
    examQuestions = allExams[currentExam].map(q => {
        const options = q.o.map((text, i) => ({ text, isCorrect: i === q.a }));
        const shuffled = shuffleArray(options);
        return { ...q, shuffledOptions: shuffled };
    });
    buildStreakDots();
    showQuestion();
}

function backToSelector() {
    document.getElementById('failOverlay').classList.remove('visible');
    document.getElementById('successOverlay').classList.remove('visible');
    document.getElementById('quizArea').classList.remove('visible');
    document.getElementById('examSelector').style.display = 'grid';
}
</script>
